<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="avatarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#30D158"/>
    </linearGradient>
    <linearGradient id="avatarFg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
  </defs>

  <circle cx="200" cy="200" r="200" fill="url(#avatarBg)"/>

  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#avatarFg)" stroke-width="2" stroke-opacity="0.2"/>
  <circle cx="200" cy="200" r="150" fill="none" stroke="url(#avatarFg)" stroke-width="1" stroke-opacity="0.1"/>

  <text x="200" y="215" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
