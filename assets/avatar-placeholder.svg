  <text x="200" y="340" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="16" font-weight="500" fill="url(#avatarFg)" fill-opacity="0.8">REPLACE WITH YOUR PHOTO</text>

  <g transform="translate(200, 280)" fill="none" stroke="url(#avatarFg)" stroke-width="2" stroke-opacity="0.5">
    <rect x="-16" y="-12" width="32" height="20" rx="3"/>
    <circle cx="0" cy="-2" r="6"/>
    <rect x="-4" y="-16" width="8" height="6" rx="1"/>
