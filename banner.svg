<svg width="1280" height="320" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" stroke-width="0.3" opacity="0.06"/>
    </pattern>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="50%" stop-color="#30D158"/>
      <stop offset="100%" stop-color="#FF9F0A"/>
    </linearGradient>
    <linearGradient id="nameGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#30D158"/>
    </linearGradient>
    <linearGradient id="roleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8E8E93"/>
      <stop offset="100%" stop-color="#636366"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="var(--canvas-default, #ffffff)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>

  <rect x="0" y="0" width="4" height="320" fill="url(#accentGradient)"/>
  <rect x="0" y="0" width="1280" height="1.5" fill="url(#accentGradient)" opacity="0.4"/>
  <rect x="0" y="318.5" width="1280" height="1.5" fill="url(#accentGradient)" opacity="0.4"/>

  <circle cx="1180" cy="60" r="80" fill="#0A84FF" opacity="0.03"/>
  <circle cx="100" cy="260" r="100" fill="#30D158" opacity="0.03"/>
  <circle cx="1200" cy="300" r="50" fill="#FF9F0A" opacity="0.02"/>

  <g transform="translate(80, 85)">
    <text x="0" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="40" font-weight="700" fill="url(#nameGradient)" letter-spacing="-0.5px">
      Abel Godoy
    </text>
    <text x="0" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="20" font-weight="400" fill="var(--fg-color-default, #1f2328)" opacity="0.85">
      QA Automation Engineer
    </text>
    <text x="0" y="132" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="15" font-weight="400" fill="var(--fg-color-muted, #656d76)">
      Python • Java • Kotlin  ·  Desktop, Web & Mobile Testing  ·  FastAPI • PyQt6 • Selenium • Appium • Cucumber
    </text>

    <g transform="translate(0, 172)">
      <g class="tech-pill" transform="translate(0, 0)">
