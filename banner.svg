        📍 Corrientes, Argentina  ·  🌐 Remote / Hybrid  ·  🕐 UTC-3  ·  ✉️ abelgodoy.1802@gmail.com
      </text>
    </g>
  </g>

  <g transform="translate(1080, 130)" opacity="0.12">
    <text x="0" y="0" font-family="'SF Mono', 'Fira Code', 'Monospace'" font-size="44" font-weight="300" fill="var(--fg-color-default, #1f2328)">{</text>
    <text x="0" y="55" font-family="'SF Mono', 'Fira Code', 'Monospace'" font-size="44" font-weight="300" fill="var(--fg-color-default, #1f2328)">}</text>
  </g>

  <g transform="translate(980, 275)" opacity="0.8">
    <rect x="0" y="0" rx="10" height="22" width="240" fill="var(--accent-emphasis, #0A84FF)" fill-opacity="0.08" stroke="var(--accent-emphasis, #0A84FF)" stroke-opacity="0.25" stroke-width="1"/>
    <text x="120" y="15" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="var(--accent-emphasis, #0A84FF)">Open to opportunities</text>
  </g>
</svg>