        <text x="47.5" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="var(--accent-emphasis, #0A84FF)">Python</text>
      </g>
      <g class="tech-pill" transform="translate(105, 0)">
        <rect x="0" y="0" rx="14" height="28" width="65" fill="var(--color-fg-success, #30D158)" fill-opacity="0.1" stroke="var(--color-fg-success, #30D158)" stroke-opacity="0.25" stroke-width="1"/>
        <text x="32.5" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="var(--color-fg-success, #30D158)">Java</text>
      </g>
      <g class="tech-pill" transform="translate(180, 0)">
        <rect x="0" y="0" rx="14" height="28" width="75" fill="#7F52FF" fill-opacity="0.1" stroke="#7F52FF" stroke-opacity="0.25" stroke-width="1"/>
        <text x="37.5" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#7F52FF">Kotlin</text>
      </g>
      <g class="tech-pill" transform="translate(265, 0)">
        <rect x="0" y="0" rx="14" height="28" width="85" fill="#FF9F0A" fill-opacity="0.1" stroke="#FF9F0A" stroke-opacity="0.25" stroke-width="1"/>
        <text x="42.5" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#FF9F0A">FastAPI</text>
      </g>
      <g class="tech-pill" transform="translate(360, 0)">
