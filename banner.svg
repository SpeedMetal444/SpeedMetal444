        <text x="35" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#4DB33D">PyQt6</text>
      </g>
      <g class="tech-pill" transform="translate(440, 0)">
        <rect x="0" y="0" rx="14" height="28" width="85" fill="#43B02A" fill-opacity="0.1" stroke="#43B02A" stroke-opacity="0.25" stroke-width="1"/>
        <text x="42.5" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#43B02A">Selenium</text>
      </g>
      <g class="tech-pill" transform="translate(535, 0)">
        <rect x="0" y="0" rx="14" height="28" width="75" fill="#FF6F61" fill-opacity="0.1" stroke="#FF6F61" stroke-opacity="0.25" stroke-width="1"/>
        <text x="37.5" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#FF6F61">Appium</text>
      </g>
      <g class="tech-pill" transform="translate(620, 0)">
        <rect x="0" y="0" rx="14" height="28" width="90" fill="#23D96C" fill-opacity="0.1" stroke="#23D96C" stroke-opacity="0.25" stroke-width="1"/>
        <text x="45" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#23D96C">Cucumber</text>
      </g>
      <g class="tech-pill" transform="translate(720, 0)">
        <rect x="0" y="0" rx="14" height="28" width="95" fill="#2088FF" fill-opacity="0.1" stroke="#2088FF" stroke-opacity="0.25" stroke-width="1"/>
        <text x="47.5" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#2088FF">GitHub Actions</text>
      </g>
